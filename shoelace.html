<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoelace Formula</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13; --surface: #1a1a22; --border: #2e2e3e;
  --text: #e8e8f0; --muted: #6b6b80;
  --blue: #6b8cff; --blue-light: #a8baff;
  --red: #ff5c5c; --accent: #c8ff57;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }
body { display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 9px 18px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--surface);
}
h1 { font-family: 'Unbounded', sans-serif; font-size: 14px; letter-spacing: .05em; color: var(--accent); white-space: nowrap; }
.subtitle { font-size: 10px; color: var(--muted); letter-spacing: .06em; white-space: nowrap; }
.btn-row { display: flex; gap: 7px; margin-left: auto; }
button {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 12px;
  border-radius: 7px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all .2s; letter-spacing: .04em; white-space: nowrap;
}
button:hover { border-color: var(--blue); color: var(--blue-light); }
button.accent { border-color: var(--accent); color: var(--accent); }
button.accent:hover { background: rgba(200,255,87,.08); }

.main { display: flex; flex: 1; overflow: hidden; }

.canvas-wrap { flex: 1; display: flex; position: relative; overflow: hidden; }
canvas#cv { display: block; cursor: crosshair; background: #0d0d14; width: 100%; height: 100%; }
.canvas-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--muted); letter-spacing: .05em; pointer-events: none;
  white-space: nowrap; background: rgba(13,13,20,0.85); padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border);
}

.lace-panel {
  width: 265px; flex-shrink: 0; background: var(--surface);
  border-left: 1px solid var(--border); padding: 14px 13px;
  display: flex; flex-direction: column; gap: 13px; overflow-y: auto;
}
.panel-label { font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
#lace-svg-wrap svg { display: block; max-width: 100%; }
.result-box { background: #12121a; border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; flex-shrink: 0; }
.result-label { font-size: 10px; color: var(--muted); letter-spacing: .06em; margin-bottom: 4px; }
.result-formula { font-size: 11px; color: var(--muted); margin-bottom: 6px; line-height: 1.6; }
.result-area { font-family: 'Unbounded', sans-serif; font-size: 22px; color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Shoelace Formula</h1>
  <span class="subtitle">ФОРМУЛА ШНУРІВКИ · ІНТЕРАКТИВНА ВІЗУАЛІЗАЦІЯ</span>
  <div class="btn-row">
    <button onclick="clearAll()">Очистити</button>
    <button onclick="addExample()">Приклад 1</button>
    <button class="accent" onclick="addExample2()">Приклад 2</button>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
    <p class="canvas-hint">ЛКМ — ДОДАТИ ТОЧКУ &nbsp;·&nbsp; ПКМ НА ТОЧЦІ — ВИДАЛИТИ &nbsp;·&nbsp; НАВЕДИ НА ТРАПЕЦІЮ</p>
  </div>
  <div class="lace-panel">
    <div class="panel-label">Шнурівка</div>
    <div id="lace-svg-wrap">
      <svg width="230" height="60"><text x="115" y="35" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#6b6b80">Потрібно ≥ 3 точок</text></svg>
    </div>
    <div class="result-box">
      <div class="result-label">ПЛОЩА МНОГОКУТНИКА</div>
      <div class="result-formula" id="result-formula">—</div>
      <div class="result-area" id="result-area">—</div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const PAD = 44;
let pts = [];
let hoverTrap = -1;
const PT_COLORS = ['#6b8cff','#3dff9e','#ffd166','#ff5c5c','#c8ff57','#c77dff','#4cc9f0','#ff9f1c'];

function resize() {
  const w = cv.parentElement;
  cv.width = w.clientWidth;
  cv.height = w.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

function getBounds() {
  if (!pts.length) return {ox:-5, oy:-5, scale: Math.min(cv.width, cv.height) / 14};
  let minX=Math.min(...pts.map(p=>p.x)), maxX=Math.max(...pts.map(p=>p.x));
  let minY=Math.min(...pts.map(p=>p.y)), maxY=Math.max(...pts.map(p=>p.y));
  const pw=cv.width-2*PAD, ph=cv.height-2*PAD;
  const rw=maxX-minX||1, rh=maxY-minY||1;
  const scale=Math.min(pw/(rw*1.6+2), ph/(rh*1.6+2), 90);
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  return {ox:cx-pw/(2*scale), oy:cy-ph/(2*scale), scale};
}

function toS(x,y,ox,oy,s){ return [PAD+(x-ox)*s, cv.height-PAD-(y-oy)*s]; }

function drawGrid(ox,oy,s){
  const w=cv.width, h=cv.height;
  ctx.strokeStyle='rgba(255,255,255,0.035)'; ctx.lineWidth=0.5;
  for(let gx=Math.floor(ox); gx<ox+(w-2*PAD)/s+1; gx++){
    const [sx]=toS(gx,0,ox,oy,s);
    ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,h); ctx.stroke();
  }
  for(let gy=Math.floor(oy); gy<oy+(h-2*PAD)/s+1; gy++){
    const [,sy]=toS(0,gy,ox,oy,s);
    ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(w,sy); ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  const [ax]=toS(0,0,ox,oy,s), [,ay]=toS(0,0,ox,oy,s);
  ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,ay); ctx.lineTo(w,ay); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='10px JetBrains Mono';
  for(let gx=Math.floor(ox); gx<ox+(w-2*PAD)/s+1; gx++){
    if(gx===0) continue;
    const [sx]=toS(gx,0,ox,oy,s), [,ayy]=toS(0,0,ox,oy,s);
    ctx.textAlign='center'; ctx.fillText(gx, sx, Math.min(Math.max(ayy+13,13),h-4));
  }
  for(let gy=Math.floor(oy); gy<oy+(h-2*PAD)/s+1; gy++){
    if(gy===0) continue;
    const [axx]=toS(0,0,ox,oy,s), [,sy]=toS(0,gy,ox,oy,s);
    ctx.textAlign='right'; ctx.fillText(gy, Math.min(Math.max(axx-5,16),w-4), sy+4);
  }
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const {ox,oy,scale:s} = getBounds();
  drawGrid(ox,oy,s);
  const n = pts.length;

  if(n >= 3){
    for(let i=0; i<n; i++){
      const a=pts[i], b=pts[(i+1)%n];
      const [ax,ay]=toS(a.x,a.y,ox,oy,s);
      const [bx,by]=toS(b.x,b.y,ox,oy,s);
      const [,ay0]=toS(a.x,0,ox,oy,s);
      const [,by0]=toS(b.x,0,ox,oy,s);
      const area=(a.y+b.y)/2*(b.x-a.x);
      const isPos=area>0.001, isNeg=area<-0.001;
      const hi=hoverTrap===i;
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(bx,by0); ctx.lineTo(ax,ay0); ctx.closePath();
      ctx.fillStyle = hi
        ? (isPos?'rgba(107,140,255,0.38)':isNeg?'rgba(255,92,92,0.38)':'rgba(120,120,140,0.28)')
        : (isPos?'rgba(107,140,255,0.1)':isNeg?'rgba(255,92,92,0.1)':'rgba(120,120,140,0.06)');
      ctx.strokeStyle = hi
        ? (isPos?'#6b8cff':isNeg?'#ff5c5c':'#888')
        : (isPos?'rgba(107,140,255,0.35)':isNeg?'rgba(255,92,92,0.35)':'rgba(150,150,150,0.18)');
      ctx.lineWidth = hi ? 1.5 : 0.8;
      ctx.fill(); ctx.stroke();
      if(hi){
        const sign = area>=0?'+':'';
        ctx.fillStyle = isPos?'#a8baff':isNeg?'#ff9494':'#aaa';
        ctx.font='bold 13px JetBrains Mono'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const cx2=(ax+bx)/2, cy2=(Math.min(ay,ay0)+Math.max(ay,ay0))/2;
        ctx.fillText(`${sign}${area.toFixed(2)}`, cx2, (cy2+((by+by0)/2))/2);
      }
    }
    ctx.beginPath();
    const [sx0,sy0]=toS(pts[0].x,pts[0].y,ox,oy,s);
    ctx.moveTo(sx0,sy0);
    for(let i=1; i<n; i++){ const [sx,sy]=toS(pts[i].x,pts[i].y,ox,oy,s); ctx.lineTo(sx,sy); }
    ctx.closePath();
    ctx.strokeStyle='rgba(200,255,87,0.75)'; ctx.lineWidth=2; ctx.setLineDash([]); ctx.stroke();
    ctx.fillStyle='rgba(200,255,87,0.05)'; ctx.fill();
  } else if(n===2){
    const [ax,ay]=toS(pts[0].x,pts[0].y,ox,oy,s);
    const [bx,by]=toS(pts[1].x,pts[1].y,ox,oy,s);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
    ctx.strokeStyle='rgba(200,255,87,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  pts.forEach((p,i)=>{
    const [sx,sy]=toS(p.x,p.y,ox,oy,s);
    ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2);
    ctx.fillStyle=PT_COLORS[i%PT_COLORS.length]; ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.font='bold 10px JetBrains Mono';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(i+1,sx,sy);
    ctx.fillStyle=PT_COLORS[i%PT_COLORS.length];
    ctx.font='11px JetBrains Mono'; ctx.textBaseline='alphabetic'; ctx.textAlign='left';
    ctx.fillText(`(${p.x},${p.y})`, sx+10, sy-6);
  });
}

cv.addEventListener('click', e=>{
  const r=cv.getBoundingClientRect();
  const px=(e.clientX-r.left)*(cv.width/r.width);
  const py=(e.clientY-r.top)*(cv.height/r.height);
  const {ox,oy,scale:s}=getBounds();
  for(let i=0; i<pts.length; i++){
    const [sx,sy]=toS(pts[i].x,pts[i].y,ox,oy,s);
    if(Math.hypot(px-sx,py-sy)<14) return;
  }
  const wx=Math.round((px-PAD)/s+ox);
  const wy=Math.round(-(py-cv.height+PAD)/s+oy);
  pts.push({x:wx,y:wy}); draw(); updatePanel();
});

cv.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const px=(e.clientX-r.left)*(cv.width/r.width);
  const py=(e.clientY-r.top)*(cv.height/r.height);
  const {ox,oy,scale:s}=getBounds();
  let closest=-1, minDist=22;
  for(let i=0; i<pts.length; i++){
    const [sx,sy]=toS(pts[i].x,pts[i].y,ox,oy,s);
    const d=Math.hypot(px-sx,py-sy);
    if(d<minDist){minDist=d; closest=i;}
  }
  if(closest>=0){ pts.splice(closest,1); hoverTrap=-1; draw(); updatePanel(); }
});

cv.addEventListener('mousemove', e=>{
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(cv.width/r.width);
  const my=(e.clientY-r.top)*(cv.height/r.height);
  const {ox,oy,scale:s}=getBounds();
  let nearPt=false;
  for(let i=0; i<pts.length; i++){
    const [sx,sy]=toS(pts[i].x,pts[i].y,ox,oy,s);
    if(Math.hypot(mx-sx,my-sy)<16){nearPt=true; break;}
  }
  cv.style.cursor=nearPt?'context-menu':'crosshair';
  if(pts.length<3){ if(hoverTrap!==-1){hoverTrap=-1; draw();} return; }
  const n=pts.length; let found=-1;
  for(let i=0; i<n; i++){
    const a=pts[i], b=pts[(i+1)%n];
    const [ax,ay]=toS(a.x,a.y,ox,oy,s);
    const [bx,by]=toS(b.x,b.y,ox,oy,s);
    const [,ay0]=toS(a.x,0,ox,oy,s);
    const [,by0]=toS(b.x,0,ox,oy,s);
    if(pointInTrap(mx,my,ax,ay,bx,by,bx,by0,ax,ay0)){found=i; break;}
  }
  if(found!==hoverTrap){hoverTrap=found; draw();}
});
cv.addEventListener('mouseleave', ()=>{hoverTrap=-1; draw();});

function pointInTrap(px,py,x1,y1,x2,y2,x3,y3,x4,y4){
  function cross(ax,ay,bx,by){return ax*by-ay*bx;}
  function inside(px,py,ax,ay,bx,by){return cross(bx-ax,by-ay,px-ax,py-ay)>=0;}
  const p=[[x1,y1],[x2,y2],[x3,y3],[x4,y4]];
  for(let i=0;i<4;i++){const [ax,ay]=p[i],[bx,by]=p[(i+1)%4]; if(!inside(px,py,ax,ay,bx,by))return false;}
  return true;
}

function buildLaceSVG(pts){
  const n=pts.length, all=[...pts,pts[0]];
  const ROW_H=54, COL_X=55, COL_Y=158, CY_START=36, R=14;
  const W=230, H=CY_START+n*ROW_H+ROW_H+20;
  const rows=all.map((p,i)=>({x:p.x,y:p.y,cy:CY_START+i*ROW_H,color:PT_COLORS[i%PT_COLORS.length],isDupe:i===n}));
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8faaff"/>
    <stop offset="40%" stop-color="#5577ee"/>
    <stop offset="100%" stop-color="#3344bb"/>
  </linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff8888"/>
    <stop offset="40%" stop-color="#ee4444"/>
    <stop offset="100%" stop-color="#aa2222"/>
  </linearGradient></defs>`;
  svg+=`<rect width="${W}" height="${H}" rx="12" fill="#12121a" stroke="#2e2e3e" stroke-width="1"/>`;
  const tx=COL_X-R-4, ty=rows[0].cy-R-4, th=rows[n].cy-rows[0].cy+R*2+8;
  svg+=`<rect x="${tx}" y="${ty}" width="${COL_Y-COL_X+R*2+8}" height="${th}" rx="10" fill="#1e1e28" stroke="#2a2a38" stroke-width="0.5"/>`;
  for(let i=0;i<n;i++){
    const r0=rows[i],r1=rows[i+1];
    svg+=tube(COL_Y,r0.cy,COL_X,r1.cy,R,'url(#gR)','#ff9494',0.85);
    svg+=tube(COL_X,r0.cy,COL_Y,r1.cy,R,'url(#gB)','#a8baff',0.95);
    const mx=(COL_X+COL_Y)/2, my=(r0.cy+r1.cy)/2;
    svg+=`<text x="${mx}" y="${my+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="13" fill="#fff" opacity="0.55">✶</text>`;
  }
  for(let i=0;i<=n;i++){
    const r=rows[i], a=r.isDupe?0.35:1;
    const xf=r.isDupe?'#555':'#6b8cff';
    const yf=i===0?'#ff5c5c':r.isDupe?'#4466cc':'#6b8cff';
    const ys=i===0?'−':'+';
    svg+=`<circle cx="${COL_X}" cy="${r.cy}" r="${R}" fill="${xf}" opacity="${a}" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>`;
    svg+=`<text x="${COL_X}" y="${r.cy+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="14" fill="white" opacity="${a}">+</text>`;
    svg+=`<circle cx="${COL_Y}" cy="${r.cy}" r="${R}" fill="${yf}" opacity="${a}" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>`;
    svg+=`<text x="${COL_Y}" y="${r.cy+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="14" fill="white" opacity="${a}">${ys}</text>`;
    const lbl=i===n?1:i+1;
    const sub=String(lbl).split('').map(c=>['₀','₁','₂','₃','₄','₅','₆','₇','₈','₉'][+c]||c).join('');
    svg+=`<text x="13" y="${r.cy+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="13" fill="${r.isDupe?'#555':r.color}" opacity="${a}">x${sub}</text>`;
    svg+=`<text x="${W-13}" y="${r.cy+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="13" fill="${r.isDupe?'#555':r.color}" opacity="${a}">y${sub}</text>`;
    if(!r.isDupe){
      svg+=`<text x="${COL_X-R-6}" y="${r.cy+4}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="${r.color}" opacity="0.85">${r.x}</text>`;
      svg+=`<text x="${COL_Y+R+6}" y="${r.cy+4}" text-anchor="start" font-family="JetBrains Mono" font-size="10" fill="${r.color}" opacity="0.85">${r.y}</text>`;
    }
  }
  const bx=tx-6, by2=rows[0].cy-R-12;
  const bh=rows[n-1].cy-rows[0].cy+R*2+24;
  svg+=`<rect x="${bx}" y="${by2}" width="${COL_Y-COL_X+R*2+36}" height="${bh}" rx="10" fill="none" stroke="#3dff9e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>`;
  svg+='</svg>';
  return svg;
}

function tube(x1,y1,x2,y2,r,fill,hl,op){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*r*0.55, ny=dx/len*r*0.55;
  return `<line x1="${x1+1}" y1="${y1+2}" x2="${x2+1}" y2="${y2+2}" stroke="rgba(0,0,0,0.4)" stroke-width="${r*1.2}" stroke-linecap="round" opacity="${op}"/>` +
    `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${fill}" stroke-width="${r*1.8}" stroke-linecap="round" opacity="${op}"/>` +
    `<line x1="${x1+nx}" y1="${y1+ny}" x2="${x2+nx}" y2="${y2+ny}" stroke="${hl}" stroke-width="${r*0.48}" stroke-linecap="round" opacity="${op*0.6}"/>`;
}

function updatePanel(){
  const n=pts.length;
  const wrap=document.getElementById('lace-svg-wrap');
  const formula=document.getElementById('result-formula');
  const areaEl=document.getElementById('result-area');
  if(n<3){
    wrap.innerHTML=`<svg width="230" height="60"><text x="115" y="35" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#6b6b80">Потрібно ≥ 3 точок</text></svg>`;
    formula.textContent='—'; areaEl.textContent='—'; return;
  }
  wrap.innerHTML=buildLaceSVG(pts);
  let pos=0,neg=0;
  for(let i=0;i<n;i++){const a=pts[i],b=pts[(i+1)%n]; pos+=a.x*b.y; neg+=b.x*a.y;}
  const area=Math.abs(pos-neg)/2;
  formula.innerHTML=`½ · |<span style="color:#a8baff">${pos.toFixed(1)}</span> − <span style="color:#ff9494">${neg.toFixed(1)}</span>|`;
  areaEl.textContent=area%1===0?area.toFixed(0):area.toFixed(2);
}

function clearAll(){ pts=[]; hoverTrap=-1; draw(); updatePanel(); }
function addExample(){ pts=[{x:1,y:1},{x:4,y:2},{x:3,y:5},{x:1,y:4}]; hoverTrap=-1; draw(); updatePanel(); }
function addExample2(){ pts=[{x:0,y:0},{x:5,y:0},{x:6,y:3},{x:3,y:6},{x:-1,y:4}]; hoverTrap=-1; draw(); updatePanel(); }

resize();
addExample();
</script>
</body>
</html>
