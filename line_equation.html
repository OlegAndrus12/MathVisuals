<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пряма через точку ⊥ вектору</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --border2: #38384a;
    --text: #e8e8f0;
    --muted: #7a7a90;
    --accent: #7fffb8;
    --accent2: #ff7fa0;
    --accent3: #7fb8ff;
    --accent-dim: rgba(127,255,184,0.12);
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--text);
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px 18px;
    gap: 20px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--surface2);
    padding: 3px;
    border-radius: 8px;
  }

  .mode-tab {
    padding: 7px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .mode-tab.active {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(127,255,184,0.25);
  }

  .hint-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }

  .hint-box b { color: var(--accent); font-weight: 500; }

  .coords-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .coord-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .coord-row:last-child { border-bottom: none; }

  .coord-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 80px;
  }

  .coord-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .coord-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .dot-color { background: var(--accent2); }
  .vec-color { background: var(--accent3); }
  .line-color { background: var(--accent); }

  .equation-box {
    background: var(--surface2);
    border: 1px solid rgba(127,255,184,0.2);
    border-radius: 10px;
    padding: 16px;
  }

  .eq-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .eq-main {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    text-align: center;
    padding: 10px 0;
    letter-spacing: 0.01em;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .eq-expanded {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    margin-top: 10px;
    padding-top: 8px;
    line-height: 1.8;
  }

  .derivation {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .derivation-step {
    font-size: 11px;
    color: var(--muted);
    line-height: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .derivation-step span { color: var(--text); }

  .clear-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    width: 100%;
  }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── CANVAS AREA ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .canvas-overlay {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  .mouse-coords {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <h1>Пряма через точку ⊥ вектору</h1>
  <span>Аналітична геометрія</span>
</header>

<div class="layout">
  <div class="sidebar">

    <!-- MODE TABS -->
    <div>
      <div class="section-label">Режим введення</div>
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-point" onclick="setMode('point')">📍 Точка</button>
        <button class="mode-tab" id="tab-vec" onclick="setMode('vector')">➡️ Вектор</button>
      </div>
    </div>

    <!-- HINT -->
    <div class="hint-box" id="hint-box">
      Натисніть на площині, щоб поставити <b>точку M₀</b>
    </div>

    <!-- COORDS -->
    <div>
      <div class="section-label">Об'єкти</div>
      <div class="coords-display">
        <div class="coord-row">
          <div class="coord-dot dot-color"></div>
          <div class="coord-label">Точка M₀</div>
          <div class="coord-value" id="disp-point">—</div>
        </div>
        <div class="coord-row">
          <div class="coord-dot vec-color"></div>
          <div class="coord-label">Вектор n̄</div>
          <div class="coord-value" id="disp-vec">—</div>
        </div>
        <div class="coord-row">
          <div class="coord-dot line-color"></div>
          <div class="coord-label">|n̄|</div>
          <div class="coord-value" id="disp-len">—</div>
        </div>
      </div>
    </div>

    <!-- EQUATION -->
    <div class="equation-box">
      <div class="eq-label">Рівняння прямої</div>
      <div class="eq-main" id="eq-main">—</div>
      <div class="eq-expanded" id="eq-expanded"></div>
    </div>

    <!-- DERIVATION -->
    <div>
      <div class="section-label">Розклад</div>
      <div class="derivation" id="derivation">
        <div class="derivation-step" style="color:var(--muted)">Задайте точку та вектор</div>
      </div>
    </div>

    <button class="clear-btn" onclick="reset()">✕ &nbsp;Очистити</button>

  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div class="canvas-overlay">
      <button class="zoom-btn" onclick="zoom(1.25)">+</button>
      <button class="zoom-btn" onclick="zoom(0.8)">−</button>
      <button class="zoom-btn" onclick="resetView()" title="Reset view">⌂</button>
      <div class="mouse-coords" id="mouse-coords">x: 0, y: 0</div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

// State
let state = { point: null, vecStart: null, vec: null, mode: 'point' };
let view = { scale: 50, ox: 0, oy: 0 }; // ox/oy = canvas center offset from origin
let dragging = false, dragStart = null, viewStart = null;
let isDraggingVec = false;

function setMode(m) {
  state.mode = m;
  document.getElementById('tab-point').classList.toggle('active', m === 'point');
  document.getElementById('tab-vec').classList.toggle('active', m === 'vector');
  updateHint();
}

function updateHint() {
  const h = document.getElementById('hint-box');
  if (state.mode === 'point') {
    h.innerHTML = 'Натисніть на площині, щоб поставити <b>точку M₀</b>';
  } else {
    if (!state.vecStart)
      h.innerHTML = 'Натисніть, щоб задати <b>початок вектора n̄</b>, потягніть для кінця';
    else
      h.innerHTML = 'Відпустіть, щоб зафіксувати <b>кінець вектора n̄</b>';
  }
}

function reset() {
  state.point = null; state.vec = null; state.vecStart = null;
  document.getElementById('disp-point').textContent = '—';
  document.getElementById('disp-vec').textContent = '—';
  document.getElementById('disp-len').textContent = '—';
  document.getElementById('eq-main').textContent = '—';
  document.getElementById('eq-expanded').textContent = '';
  document.getElementById('derivation').innerHTML = '<div class="derivation-step" style="color:var(--muted)">Задайте точку та вектор</div>';
  draw();
}

function resetView() {
  const W = cv.width / devicePixelRatio, H = cv.height / devicePixelRatio;
  view.ox = W / 2; view.oy = H / 2; view.scale = 50;
  draw();
}

function zoom(f) {
  const W = cv.width / devicePixelRatio, H = cv.height / devicePixelRatio;
  const cx = W / 2, cy = H / 2;
  view.ox = cx + (view.ox - cx) * f;
  view.oy = cy + (view.oy - cy) * f;
  view.scale *= f;
  draw();
}

// Coordinate transforms
function toScreen(gx, gy) { return [view.ox + gx * view.scale, view.oy - gy * view.scale]; }
function toGrid(sx, sy) { return [(sx - view.ox) / view.scale, (view.oy - sy) / view.scale]; }
function snap(v) { return Math.round(v * 4) / 4; }

function fmt(v) {
  const r = Math.round(v * 100) / 100;
  return r % 1 === 0 ? String(r) : r.toFixed(2);
}

function buildEquation(A, B, x0, y0) {
  const C = -(A * x0 + B * y0);
  let parts = [];

  function termStr(coef, varName, first) {
    if (coef === 0) return null;
    const absC = Math.abs(coef);
    const sign = coef < 0 ? '−' : first ? '' : '+';
    const coefStr = absC === 1 ? '' : fmt(absC);
    return `${sign}${coefStr}${varName}`;
  }

  const t1 = termStr(A, 'x', true);
  if (t1) parts.push(t1);
  const t2 = termStr(B, 'y', parts.length === 0);
  if (t2) parts.push(t2);
  if (C !== 0 || parts.length === 0) {
    const sign = C < 0 ? '−' : parts.length ? '+' : '';
    parts.push(`${sign}${fmt(Math.abs(C))}`);
  }
  return parts.join(' ') + ' = 0';
}

function updateUI() {
  const { point, vec } = state;
  if (point) {
    document.getElementById('disp-point').textContent = `(${fmt(point[0])}, ${fmt(point[1])})`;
  }
  if (vec) {
    document.getElementById('disp-vec').textContent = `(${fmt(vec[0])}, ${fmt(vec[1])})`;
    const len = Math.hypot(vec[0], vec[1]);
    document.getElementById('disp-len').textContent = fmt(len);
  }

  if (point && vec && (vec[0] !== 0 || vec[1] !== 0)) {
    const [A, B] = vec;
    const [x0, y0] = point;
    const C = -(A * x0 + B * y0);
    const eq = buildEquation(A, B, x0, y0);
    document.getElementById('eq-main').textContent = eq;

    const expanded = `${fmt(A)}·(x − ${fmt(x0)}) + ${fmt(B)}·(y − ${fmt(y0)}) = 0`;
    document.getElementById('eq-expanded').textContent = expanded;

    document.getElementById('derivation').innerHTML = `
      <div class="derivation-step">Нормаль n̄ <span>(${fmt(A)}, ${fmt(B)})</span></div>
      <div class="derivation-step">Точка M₀ <span>(${fmt(x0)}, ${fmt(y0)})</span></div>
      <div class="derivation-step">A <span>${fmt(A)}</span></div>
      <div class="derivation-step">B <span>${fmt(B)}</span></div>
      <div class="derivation-step">C = −Ax₀−By₀ <span>${fmt(C)}</span></div>
      <div class="derivation-step" style="margin-top:4px;border-top:1px solid var(--border);padding-top:8px">Рівняння <span style="color:var(--accent)">${eq}</span></div>
    `;
  }
}

// ── DRAW ──
function draw() {
  const dpr = devicePixelRatio;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  if (!view.ox) { view.ox = W / 2; view.oy = H / 2; }

  // Background
  ctx.fillStyle = '#0d0d0f';
  ctx.fillRect(0, 0, W, H);

  // Subtle dot grid
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  const step = view.scale;
  const startX = ((view.ox % step) + step) % step;
  const startY = ((view.oy % step) + step) % step;
  for (let x = startX; x < W; x += step)
    for (let y = startY; y < H; y += step) {
      ctx.beginPath(); ctx.arc(x, y, 0.8, 0, Math.PI * 2); ctx.fill();
    }

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, view.oy); ctx.lineTo(W, view.oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(view.ox, 0); ctx.lineTo(view.ox, H); ctx.stroke();

  // Axis ticks & labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = `300 10px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  const tstep = view.scale < 20 ? 5 : view.scale < 40 ? 2 : 1;
  const gridStart = Math.ceil(-view.ox / view.scale / tstep) * tstep;
  const gridEnd = Math.floor((W - view.ox) / view.scale / tstep) * tstep;
  for (let g = gridStart; g <= gridEnd; g += tstep) {
    const sx = view.ox + g * view.scale;
    if (g !== 0) {
      ctx.beginPath(); ctx.moveTo(sx, view.oy - 4); ctx.lineTo(sx, view.oy + 4); ctx.stroke();
      ctx.fillText(g, sx, view.oy + 15);
    }
  }
  const vStart = Math.ceil((view.oy - H) / view.scale / tstep) * tstep;
  const vEnd = Math.floor(view.oy / view.scale / tstep) * tstep;
  ctx.textAlign = 'right';
  for (let g = vStart; g <= vEnd; g += tstep) {
    const sy = view.oy - g * view.scale;
    if (g !== 0) {
      ctx.beginPath(); ctx.moveTo(view.ox - 4, sy); ctx.lineTo(view.ox + 4, sy); ctx.stroke();
      ctx.fillText(g, view.ox - 8, sy + 3);
    }
  }

  // Axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `400 11px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'left';
  ctx.fillText('x', W - 16, view.oy - 8);
  ctx.textAlign = 'center';
  ctx.fillText('y', view.ox + 10, 14);

  // Line (if both defined)
  const { point, vec, vecStart } = state;
  if (point && vec && (vec[0] !== 0 || vec[1] !== 0)) {
    const [A, B] = vec;
    const [x0, y0] = point;
    const C = -(A * x0 + B * y0);

    // Ax + By + C = 0
    let p1, p2;
    if (Math.abs(B) > 1e-9) {
      const lx = (0 - view.ox) / view.scale;
      const rx = (W - view.ox) / view.scale;
      p1 = [lx, -(A * lx + C) / B];
      p2 = [rx, -(A * rx + C) / B];
    } else {
      const xi = -C / A;
      p1 = [xi, (view.oy) / view.scale];
      p2 = [xi, -(H - view.oy) / view.scale];
    }
    const [sx1, sy1] = toScreen(...p1);
    const [sx2, sy2] = toScreen(...p2);

    // Glow
    ctx.save();
    ctx.shadowColor = 'rgba(127,255,184,0.5)';
    ctx.shadowBlur = 18;
    ctx.strokeStyle = '#7fffb8';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
    ctx.restore();
  }

  // Vector (live preview while dragging)
  const drawVec = (vec && vecStart) ? { start: vecStart, v: vec } : null;
  if (drawVec) {
    const [sx, sy] = toScreen(...drawVec.start);
    const ex = sx + drawVec.v[0] * view.scale;
    const ey = sy - drawVec.v[1] * view.scale;

    ctx.save();
    ctx.strokeStyle = '#7fb8ff';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(127,184,255,0.4)';
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    // Arrow
    const angle = Math.atan2(ey - sy, ex - sx);
    const al = 14;
    ctx.fillStyle = '#7fb8ff';
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - al * Math.cos(angle - 0.4), ey - al * Math.sin(angle - 0.4));
    ctx.lineTo(ex - al * Math.cos(angle + 0.4), ey - al * Math.sin(angle + 0.4));
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Perpendicular symbol at vecStart
    if (point) {
      const [px, py] = toScreen(...point);
      if (Math.abs(px - sx) < 4 && Math.abs(py - sy) < 4) drawPerpMark(sx, sy, angle);
    }
  }

  // Point
  if (point) {
    const [sx, sy] = toScreen(...point);
    ctx.save();
    ctx.shadowColor = 'rgba(255,127,160,0.6)'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#ff7fa0';
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ff7fa0';
    ctx.font = `500 12px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(`M₀(${fmt(point[0])}, ${fmt(point[1])})`, sx + 10, sy - 8);
  }
}

function drawPerpMark(x, y, vecAngle) {
  const s = 10;
  const a = vecAngle;
  ctx.save();
  ctx.strokeStyle = 'rgba(127,255,184,0.6)'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x + s * Math.cos(a + Math.PI / 2), y + s * Math.sin(a + Math.PI / 2));
  ctx.lineTo(x + s * Math.cos(a + Math.PI / 2) + s * Math.cos(a), y + s * Math.sin(a + Math.PI / 2) + s * Math.sin(a));
  ctx.lineTo(x + s * Math.cos(a), y + s * Math.sin(a));
  ctx.stroke();
  ctx.restore();
}

// ── EVENTS ──
let isMiddleDrag = false, prevMouse = null;

cv.addEventListener('mousedown', e => {
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;

  if (e.button === 1 || e.altKey) {
    isMiddleDrag = true; prevMouse = [mx, my]; e.preventDefault(); return;
  }
  if (e.button !== 0) return;

  const [gx, gy] = toGrid(mx, my).map(snap);

  if (state.mode === 'point') {
    state.point = [gx, gy];
    updateUI(); draw();
  } else {
    // Vector mode: start drag
    state.vecStart = [gx, gy];
    state.vec = [0, 0];
    isDraggingVec = true;
    updateHint();
  }
});

cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const [gx, gy] = toGrid(mx, my);

  document.getElementById('mouse-coords').textContent = `x: ${fmt(snap(gx))}, y: ${fmt(snap(gy))}`;

  if (isMiddleDrag && prevMouse) {
    view.ox += mx - prevMouse[0];
    view.oy += my - prevMouse[1];
    prevMouse = [mx, my];
    draw(); return;
  }

  if (isDraggingVec && state.vecStart) {
    const [sx, sy] = state.vecStart;
    state.vec = [snap(gx) - sx, snap(gy) - sy];
    updateUI(); draw();
  }
});

cv.addEventListener('mouseup', e => {
  if (isMiddleDrag) { isMiddleDrag = false; prevMouse = null; return; }
  if (isDraggingVec) {
    isDraggingVec = false;
    updateHint();
    // Auto-switch back to point mode if no point yet
    if (!state.point) setMode('point');
    draw();
  }
});

cv.addEventListener('wheel', e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  view.ox = mx + (view.ox - mx) * f;
  view.oy = my + (view.oy - my) * f;
  view.scale *= f;
  draw();
}, { passive: false });

// Touch
let lastTouchDist = null;
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) { lastTouchDist = null; return; }
  const t = e.touches[0];
  const r = cv.getBoundingClientRect();
  const mx = t.clientX - r.left, my = t.clientY - r.top;
  const [gx, gy] = toGrid(mx, my).map(snap);
  if (state.mode === 'point') { state.point = [gx, gy]; updateUI(); draw(); }
  else { state.vecStart = [gx, gy]; state.vec = [0, 0]; isDraggingVec = true; }
});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    if (lastTouchDist) { const f = dist / lastTouchDist; view.scale *= f; draw(); }
    lastTouchDist = dist; return;
  }
  const t = e.touches[0];
  const r = cv.getBoundingClientRect();
  const mx = t.clientX - r.left, my = t.clientY - r.top;
  const [gx, gy] = toGrid(mx, my);
  if (isDraggingVec && state.vecStart) {
    const [sx, sy] = state.vecStart;
    state.vec = [snap(gx) - sx, snap(gy) - sy];
    updateUI(); draw();
  }
}, { passive: false });

cv.addEventListener('touchend', () => { isDraggingVec = false; lastTouchDist = null; updateHint(); });

window.addEventListener('resize', draw);

draw();
</script>
</body>
</html>
